name: Run Replication

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  replicate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Step 1 - Download ClimateFish
        run: python 01_download_climatefish.py

      - name: Step 2 - Download Bio-ORACLE
        run: python 02_download_biooracle.py

      - name: Step 3 - Spatial join
        run: python 03_spatial_join.py

      - name: Step 4 - Community analysis
        run: python 04_community_analysis.py

      - name: Step 5 - Variable importance
        run: python 05_variable_importance.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: replication-results
          path: results/
